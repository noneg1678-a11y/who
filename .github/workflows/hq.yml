name: Download Video from HQPorner

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'آدرس ویدیو مورد نظر را وارد کنید'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install hqporner-api
        run: pip install hqporner-api
      
      - name: Run download script
        run: python download_script.py "${{ github.event.inputs.video_url }}"
      
      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloaded_video/*.mp4
          retention-days: 7
