name: Download Video from HQPorner

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'آدرس ویدیو را وارد کنید'
        required: true
        type: string
      quality:
        description: 'کیفیت (360, 720, 1080)'
        required: false
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '360'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install hqporner-api
      
      - name: Run download script
        run: python download_script.py "${{ github.event.inputs.video_url }}"
        env:
          VIDEO_QUALITY: ${{ github.event.inputs.quality }}
      
      - name: Get folder name
        id: get_folder
        run: |
          FOLDER=$(cat last_folder.txt)
          echo "folder_name=$FOLDER" >> $GITHUB_OUTPUT
          echo "Found folder: $FOLDER"
      
      - name: Parallel add files to git
        run: |
          FOLDER="${{ steps.get_folder.outputs.folder_name }}"
          cd $FOLDER
          # پیدا کردن همه فایل‌ها و اضافه کردن موازی
          ls video.zip* video.z* 2>/dev/null | xargs -P 10 -I {} git add {}
          cd ..
          git add last_folder.txt
      
      - name: Parallel commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # گرفتن لیست فایل‌ها
          FOLDER="${{ steps.get_folder.outputs.folder_name }}"
          FILES=$(ls $FOLDER/video.zip* $FOLDER/video.z* 2>/dev/null | tr '\n' ' ')
          
          # کامیت کردن همه با هم
          git add $FILES last_folder.txt
          git commit -m "Add video parts [skip ci]" || echo "No changes to commit"
          
          # پوش با --force برای سرعت بیشتر
          git push --force-with-lease
