name: Download Video from HQPorner

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'آدرس ویدیو را وارد کنید'
        required: true
        type: string
      quality:
        description: 'کیفیت (360, 720, 1080)'
        required: false
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '360'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install hqporner-api
      
      - name: Run download script
        run: python download_script.py "${{ github.event.inputs.video_url }}"
        env:
          VIDEO_QUALITY: ${{ github.event.inputs.quality }}
      
      - name: Get folder name
        id: get_folder
        run: |
          if [ -f last_folder.txt ]; then
            FOLDER=$(cat last_folder.txt)
            echo "folder_name=$FOLDER" >> $GITHUB_OUTPUT
            echo "Found folder: $FOLDER"
          else
            echo "folder_name=unknown" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload split files
        uses: actions/upload-artifact@v4
        with:
          name: video-parts-${{ github.run_id }}
          path: |
            */video.zip*
            */video.z*
          retention-days: 7
      
      - name: Commit and push split files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */video.zip* */video.z* last_folder.txt
          git commit -m "Add downloaded video parts [skip ci]" || echo "No changes to commit"
          git push
