name: Download Video from HQPorner

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'آدرس ویدیو را وارد کنید'
        required: true
        type: string
      quality:
        description: 'کیفیت (360, 720, 1080)'
        required: false
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '360'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Install zip (for splitting)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install hqporner-api
      
      - name: Run download script
        run: python download_script.py "${{ github.event.inputs.video_url }}"
        env:
          VIDEO_QUALITY: ${{ github.event.inputs.quality }}
      
      - name: Push files to repository
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A)" ]; then
            echo "No files to upload."
            exit 0
          fi

          # اضافه کردن پوشه‌های رندوم و فایل‌های زیپ شده
          git add */video.zip* */video.z* last_folder.txt
          git commit -m "Add video parts [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            if git push origin "${{ github.ref_name }}"; then
              echo "Push succeeded."
              break
            else
              [ $i -lt $RETRIES ] && sleep 3 || echo "Push failed after $RETRIES attempts"
            fi
          done
