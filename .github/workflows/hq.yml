name: Download Video from HQPorner

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'آدرس ویدیو را وارد کنید'
        required: true
        type: string
      quality:
        description: 'کیفیت (360, 720, 1080)'
        required: false
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '360'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Install zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install hqporner-api
      
      - name: Run download script
        run: python download_script.py "${{ github.event.inputs.video_url }}"
        env:
          VIDEO_QUALITY: ${{ github.event.inputs.quality }}
      
      - name: List all files for debugging
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo "=== All folders ==="
          find . -type d | head -20
          echo "=== All zip files ==="
          find . -name "*.zip*" -o -name "*.z*" | head -20
          echo "=== last_folder.txt content ==="
          cat last_folder.txt 2>/dev/null || echo "last_folder.txt not found"
      
      - name: Push files to repository
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          # خواندن نام پوشه از فایل
          if [ -f "last_folder.txt" ]; then
            FOLDER=$(cat last_folder.txt)
            echo "Found folder: $FOLDER"
            
            # اضافه کردن فایل‌های داخل آن پوشه
            if [ -d "$FOLDER" ]; then
              echo "Adding files from $FOLDER"
              git add "$FOLDER"/
            fi
          else
            echo "last_folder.txt not found, trying to add all zip files"
            git add *.zip* *.z* 2>/dev/null || true
            git add */*.zip* */*.z* 2>/dev/null || true
          fi
          
          git add last_folder.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add video parts [skip ci]"
            
            RETRIES=5
            for i in $(seq 1 $RETRIES); do
              echo "Push attempt $i..."
              git pull --rebase --autostash origin "${{ github.ref_name }}" || true
              if git push origin "${{ github.ref_name }}"; then
                echo "Push succeeded."
                break
              else
                [ $i -lt $RETRIES ] && sleep 3 || echo "Push failed after $RETRIES attempts"
              fi
            done
          fi
