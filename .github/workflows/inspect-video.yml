name: Inspect Video Info

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to inspect'
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install hqporner-api
        run: pip install hqporner-api
      
      - name: Inspect video
        run: python inspect_video.py "${{ github.event.inputs.video_url }}"
